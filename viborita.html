<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Viborita</title>
    <link rel="stylesheet" href="./static/styles/arcade.css">
</head>
<body>
    <main class="game-card">
        <h1>🐍 Viborita</h1>
        <p class="lead">Come los puntos amarillos sin tocar los bordes ni tu cola.</p>
        <div class="toolbar"><strong>Puntos: <span id="snakeScore">0</span></strong></div>
        <p class="status" id="snakeStatus" aria-live="polite">Pulsa comenzar.</p>
        <div class="canvas-wrap"><canvas id="snakeCanvas" width="360" height="360"></canvas></div>
        <div class="direction-pad">
            <button data-dir="up" aria-label="Arriba">▲</button><span class="break"></span>
            <button data-dir="left" aria-label="Izquierda">◀</button>
            <button data-dir="down" aria-label="Abajo">▼</button>
            <button data-dir="right" aria-label="Derecha">▶</button>
        </div>
        <div class="toolbar"><button id="snakeStart">Comenzar / reiniciar</button><button id="snakePause" class="secondary">Pausar</button></div>
        <a class="back-link" href="./index.html">← Volver al menú</a>
    </main>
    <script src="./static/js/viborita.js"></script>
</body>
</html>
