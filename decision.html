<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Café Perfecto · Juego de Decisión</title>
    <link rel="stylesheet" href="static/styles/decision.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1>☕ El Café Perfecto</h1>
        <div id="story-container">
            <p id="story-text">Cargando historia...</p>
        </div>
        <div id="options-container"></div>
        <div id="counter">
            <span>Decisiones tomadas: </span>
            <span id="decision-count">0</span>
        </div>
        <button id="reset-btn" class="btn back" style="display: none;">🔄 Reiniciar aventura</button>
        <div class="footer">⚡ Juego de Decisión ⚡</div>
    </div>

    <!-- BOTÓN FLOTANTE PARA VOLVER AL MENÚ PRINCIPAL -->
    <div class="quiz-eco-btn-container">
        <button class="quiz-eco-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-home"></i> Volver al menú
        </button>
    </div>

    <script src="static/js/decision.js"></script>
</body>
</html>
